name: Deploy to VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy out/ to VPS via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            out/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/flashcards/"

      - name: Deploy sync service + reload pm2
        run: |
          rsync -avz --delete --exclude='.env' --exclude='node_modules' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            server/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/flashcards-sync/"
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'cd /opt/flashcards-sync && pm2 reload ecosystem.config.cjs'

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
