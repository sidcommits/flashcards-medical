<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Flashcards — Sign in</title>
<style>
  :root { --paper:#f4efe6; --ink:#22201c; --muted:#7c7468; --line:#d8cfc0; --card:#fbf8f1; --accent:#7c2b3e; }
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px;
    font-family:Georgia,"Times New Roman",serif; color:var(--ink);
    background:radial-gradient(1100px 560px at 50% -12%, rgba(255,255,255,.65), transparent 62%), var(--paper); }
  .card { width:100%; max-width:360px; background:var(--card); border:1.5px solid var(--line);
    border-radius:18px; box-shadow:0 18px 40px -22px rgba(40,30,20,.18); padding:28px; }
  h1 { font-weight:900; font-size:30px; margin:0 0 4px; }
  p { color:var(--muted); margin:0 0 20px; font-size:15px; }
  input { width:100%; padding:12px 14px; font-size:16px; border:1.5px solid var(--line);
    border-radius:12px; background:#fff; color:var(--ink); }
  button { width:100%; margin-top:12px; padding:12px 14px; font-size:16px; font-weight:700;
    border:none; border-radius:12px; background:var(--accent); color:#fff; cursor:pointer; }
  button:disabled { opacity:.6; }
  .err { color:#9b2226; font-size:14px; min-height:18px; margin-top:10px; }
</style>
</head>
<body>
  <form class="card" id="f">
    <h1>Flashcards</h1>
    <p>Enter the password to continue.</p>
    <input id="pw" type="password" autocomplete="current-password" placeholder="Password" autofocus />
    <button id="btn" type="submit">Sign in</button>
    <div class="err" id="err"></div>
  </form>
<script>
  const f = document.getElementById('f'), pw = document.getElementById('pw'),
        btn = document.getElementById('btn'), err = document.getElementById('err');
  f.addEventListener('submit', async (e) => {
    e.preventDefault(); err.textContent = ''; btn.disabled = true;
    try {
      const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ password: pw.value }) });
      if (res.ok) { location.href = '/'; return; }
      err.textContent = res.status === 429 ? 'Too many attempts — wait a minute.' : 'Wrong password.';
    } catch { err.textContent = 'Network error — try again.'; }
    btn.disabled = false;
  });
</script>
</body>
</html>
