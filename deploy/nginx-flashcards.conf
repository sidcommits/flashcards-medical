# Reference copy of the nginx server block on the VPS.
# Live location: /etc/nginx/sites-available/flashcards
#   (symlinked into /etc/nginx/sites-enabled/flashcards)
#
# Static Next.js export served by nginx, gated behind the flashcards-sync
# service (pm2, 127.0.0.1:3010): every request except /login.html and /api/*
# requires a valid session cookie (auth_request -> /_verify). DNS is the
# wildcard *.webkraft.work -> 185.135.137.223; TLS uses the existing wildcard
# cert at /etc/letsencrypt/live/webkraft.work/ (certbot auto-renew).
#
# Static files are pushed to /var/www/flashcards and the service to
# /opt/flashcards-sync by .github/workflows/deploy.yml.

server {
    listen 80;
    server_name flashcards.webkraft.work;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name flashcards.webkraft.work;

    ssl_certificate     /etc/letsencrypt/live/webkraft.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webkraft.work/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /var/www/flashcards;
    index index.html;

    # Compress text assets in-flight — scoped to this site. Deck CSV is the big
    # win: ~576 KB -> ~130 KB per cold load. Brotli isn't compiled, so gzip.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css text/csv text/javascript application/javascript application/json application/manifest+json image/svg+xml;

    # Internal auth subrequest -> sync service.
    location = /auth_verify {
        internal;
        proxy_pass http://127.0.0.1:3010/_verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
    }

    # API: public entry; the service enforces auth on protected routes itself.
    location /api/ {
        proxy_pass http://127.0.0.1:3010/api/;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Public login page (the only ungated HTML).
    location = /login.html { }

    # PWA manifest + icons: fetched by the browser WITHOUT credentials, so they
    # must be ungated or install/manifest parsing fails. They contain no secrets.
    location = /manifest.webmanifest { default_type application/manifest+json; }
    location /icons/ { }

    # Service worker: non-sensitive, allowed at root scope. Un-gated so the SW can
    # update even while the sync service is reloading during a deploy.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
    }

    # Deck data: gated, always fresh.
    location /decks/ {
        auth_request /auth_verify;
        error_page 401 = @login;
        add_header Cache-Control "no-cache";
        # .csv isn't in nginx mime.types (defaults to octet-stream, which gzip
        # skips). Map it to text/csv here so gzip_types matches. This dir only
        # serves .csv and .json.
        types { text/csv csv; application/json json; }
        default_type application/octet-stream;
        try_files $uri =404;
    }

    # Immutable, content-hashed build assets — non-sensitive (repo is public).
    # Un-gated so JS/CSS delivery is never blocked by the sync service reloading.
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Everything else: gated.
    location / {
        auth_request /auth_verify;
        error_page 401 = @login;
        try_files $uri $uri/ $uri.html =404;
    }

    location @login { return 302 /login.html; }

    error_page 404 /404.html;
}
