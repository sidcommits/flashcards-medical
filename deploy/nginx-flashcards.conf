# Reference copy of the nginx server block on the VPS.
# Live location: /etc/nginx/sites-available/flashcards
#   (symlinked into /etc/nginx/sites-enabled/flashcards)
#
# Static Next.js export served directly by nginx. DNS is the wildcard
# *.webkraft.work -> 185.135.137.223; TLS uses the existing wildcard cert
# at /etc/letsencrypt/live/webkraft.work/ (auto-renewed by certbot), so no
# per-subdomain DNS or certbot step is needed.
#
# Files are pushed to /var/www/flashcards by the GitHub Actions workflow
# (.github/workflows/deploy.yml) via rsync --delete.

server {
    listen 80;
    server_name flashcards.webkraft.work;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name flashcards.webkraft.work;

    ssl_certificate     /etc/letsencrypt/live/webkraft.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webkraft.work/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /var/www/flashcards;
    index index.html;

    # CSV/JSON deck data must always be fresh so spreadsheet edits show on refresh
    location /decks/ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Immutable hashed build assets
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;
}
